name: Deploy Backend to Render

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is not set. Skipping backend deploy."
            echo "To enable automatic backend deploys, add your Render deploy hook URL to GitHub secrets."
            exit 0
          fi
          curl -X POST "$RENDER_DEPLOY_HOOK"
