services:
  - type: web
    name: sistemadeinventario-ard-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sistemadeinventario-ard-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://lanxerz.github.io,https://lanxerz.github.io/SistemadeInventario-ARD"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
    autoDeploy: true

databases:
  - name: sistemadeinventario-ard-db
    plan: free
    databaseName: sistemadeinventario_ard
    user: sistemadeinventario_ard
