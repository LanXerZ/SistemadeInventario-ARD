services:
  - type: web
    name: sistemadeinventario-ard-api
    runtime: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "cd backend && python manage.py migrate && python manage.py ensure_default_superuser && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sistemadeinventario-ard-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://lanxerz.github.io"
      - key: ALLOWED_HOSTS
        value: "sistemadeinventario-ard-api.onrender.com,localhost,127.0.0.1"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
    autoDeploy: true

databases:
  - name: sistemadeinventario-ard-db
    plan: free
    databaseName: sistemadeinventario_ard
    user: sistemadeinventario_ard
